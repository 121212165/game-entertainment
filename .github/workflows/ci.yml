name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify project files exist
        run: |
          test -f silema.html || (echo "Missing silema.html" && exit 1)
          test -f bioevolution/index.html || (echo "Missing bioevolution/index.html" && exit 1)
          echo "All expected files present."
